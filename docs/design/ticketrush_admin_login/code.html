<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - TicketRush</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#006c49",
                    "on-primary-fixed-variant": "#004395",
                    "surface-tint": "#005ac2",
                    "surface-container-high": "#e1e8fd",
                    "on-secondary-fixed-variant": "#005236",
                    "tertiary": "#825100",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ffddb8",
                    "on-tertiary-fixed-variant": "#653e00",
                    "surface-container": "#e9edff",
                    "primary": "#0058be",
                    "outline": "#727785",
                    "on-background": "#141b2b",
                    "error": "#ba1a1a",
                    "secondary-fixed": "#6ffbbe",
                    "outline-variant": "#c2c6d6",
                    "tertiary-container": "#a36700",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#2a1700",
                    "inverse-on-surface": "#edf0ff",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#001a42",
                    "on-secondary-fixed": "#002113",
                    "primary-fixed-dim": "#adc6ff",
                    "primary-container": "#2170e4",
                    "secondary-container": "#6cf8bb",
                    "on-tertiary-container": "#fffbff",
                    "primary-fixed": "#d8e2ff",
                    "surface-container-highest": "#dce2f7",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#ffb95f",
                    "on-error-container": "#93000a",
                    "surface-variant": "#dce2f7",
                    "on-secondary-container": "#00714d",
                    "error-container": "#ffdad6",
                    "on-surface-variant": "#424754",
                    "inverse-surface": "#293040",
                    "secondary-fixed-dim": "#4edea3",
                    "background": "#f9f9ff",
                    "surface-dim": "#d3daef",
                    "surface-bright": "#f9f9ff",
                    "inverse-primary": "#adc6ff",
                    "on-surface": "#141b2b",
                    "surface-container-low": "#f1f3ff",
                    "surface": "#f9f9ff",
                    "on-primary-container": "#fefcff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin": "32px",
                    "gutter": "24px",
                    "container-max": "1280px",
                    "section-padding": "64px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "label-bold": [
                            "Outfit"
                    ],
                    "h3": [
                            "Outfit"
                    ],
                    "body-md": [
                            "Outfit"
                    ],
                    "h2": [
                            "Outfit"
                    ],
                    "h1": [
                            "Outfit"
                    ],
                    "body-lg": [
                            "Outfit"
                    ]
            },
            "fontSize": {
                    "label-bold": [
                            "14px",
                            {
                                    "lineHeight": "1",
                                    "letterSpacing": "0.05em",
                                    "fontWeight": "700"
                            }
                    ],
                    "h3": [
                            "24px",
                            {
                                    "lineHeight": "1.2",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "1.5",
                                    "letterSpacing": "0",
                                    "fontWeight": "400"
                            }
                    ],
                    "h2": [
                            "36px",
                            {
                                    "lineHeight": "1.2",
                                    "letterSpacing": "-0.03em",
                                    "fontWeight": "800"
                            }
                    ],
                    "h1": [
                            "48px",
                            {
                                    "lineHeight": "1.1",
                                    "letterSpacing": "-0.04em",
                                    "fontWeight": "800"
                            }
                    ],
                    "body-lg": [
                            "18px",
                            {
                                    "lineHeight": "1.6",
                                    "letterSpacing": "0",
                                    "fontWeight": "400"
                            }
                    ]
            }
    },
        },
      }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center font-['Outfit']">
<div class="flex flex-col md:flex-row w-full h-screen overflow-hidden">
<!-- Left Side: Branding / Visual (Hidden on smaller screens) -->
<div class="hidden md:flex md:w-1/2 bg-primary relative items-center justify-center overflow-hidden">
<!-- Decorative Geometry -->
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-white opacity-5"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] bg-white opacity-5 transform rotate-45"></div>
<div class="relative z-10 flex flex-col items-center">
<h1 class="text-on-primary text-[64px] font-black italic tracking-tighter mb-4">TicketRush</h1>
<p class="text-on-primary text-xl font-bold uppercase tracking-widest opacity-80">Digital-Print Velocity</p>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full md:w-1/2 flex items-center justify-center bg-surface p-8 sm:p-12 lg:p-24 relative">
<!-- Mobile Logo (Visible only on mobile) -->
<div class="absolute top-8 left-8 md:hidden">
<span class="text-primary text-2xl font-black italic tracking-tighter">TicketRush</span>
</div>
<div class="w-full max-w-md space-y-10">
<div class="space-y-3 border-l-4 border-primary pl-6 py-2">
<h2 class="font-h2 text-h2 text-on-surface">Admin Portal Login</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant font-medium">Authorized Access Only</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-label-bold text-label-bold text-on-surface uppercase" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-2 border-transparent text-on-surface font-body-md focus:outline-none focus:border-primary transition-colors duration-200" id="email" name="email" placeholder="admin@ticketrush.com" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-bold text-label-bold text-on-surface uppercase" for="password">Password</label>
<a class="font-label-bold text-label-bold text-primary hover:text-on-primary-fixed-variant hover:underline transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-2 border-transparent text-on-surface font-body-md focus:outline-none focus:border-primary transition-colors duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full py-4 bg-primary text-on-primary font-label-bold text-label-bold uppercase tracking-widest border-2 border-primary hover:bg-on-primary-fixed-variant hover:scale-105 active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 group" type="submit">
<span>Login</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
</div>
</div>
</body></html>
