<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TicketRush - Waiting Room</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#2a1700",
                        "on-secondary-container": "#00714d",
                        "on-secondary-fixed": "#002113",
                        "secondary-fixed": "#6ffbbe",
                        "surface-bright": "#f9f9ff",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-background": "#141b2b",
                        "surface-container-highest": "#dce2f7",
                        "surface-container-high": "#e1e8fd",
                        "surface-variant": "#dce2f7",
                        "on-error-container": "#93000a",
                        "surface-dim": "#d3daef",
                        "tertiary": "#825100",
                        "outline-variant": "#c2c6d6",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffddb8",
                        "surface-container": "#e9edff",
                        "background": "#f9f9ff",
                        "primary-container": "#2170e4",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#424754",
                        "secondary": "#006c49",
                        "surface": "#f9f9ff",
                        "secondary-container": "#6cf8bb",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#293040",
                        "on-error": "#ffffff",
                        "surface-tint": "#005ac2",
                        "primary-fixed": "#d8e2ff",
                        "primary": "#0058be",
                        "on-primary-fixed": "#001a42",
                        "on-primary-fixed-variant": "#004395",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#adc6ff",
                        "secondary-fixed-dim": "#4edea3",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#edf0ff",
                        "surface-container-low": "#f1f3ff",
                        "tertiary-container": "#a36700",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-tertiary-container": "#fffbff",
                        "inverse-primary": "#adc6ff",
                        "on-primary-container": "#fefcff",
                        "outline": "#727785",
                        "on-secondary-fixed-variant": "#005236",
                        "on-surface": "#141b2b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "margin": "32px",
                        "unit": "8px",
                        "gutter": "24px",
                        "section-padding": "64px"
                    },
                    "fontFamily": {
                        "h1": ["Outfit"],
                        "body-lg": ["Outfit"],
                        "label-bold": ["Outfit"],
                        "h2": ["Outfit"],
                        "h3": ["Outfit"],
                        "body-md": ["Outfit"]
                    },
                    "fontSize": {
                        "h1": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "h2": ["36px", { "lineHeight": "1.2", "letterSpacing": "-0.03em", "fontWeight": "800" }],
                        "h3": ["24px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .poster-bg {
            background-color: #f59e0b; /* Amber 500 equivalent */
            overflow: hidden;
            position: relative;
        }
        .rotated-shape {
            position: absolute;
            opacity: 0.05;
            background-color: #000;
            transform: rotate(45deg);
        }
        .flat-border {
            border: 2px solid #111827;
        }
        .thick-border {
            border: 4px solid #111827;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Simplified Navigation for Waiting Room (Transactional intent) -->
<header class="bg-surface border-b-2 border-gray-900 flex justify-between items-center w-full px-8 h-20">
<div class="flex items-center gap-4">
<span class="font-h3 text-h3 font-black italic tracking-tighter text-gray-900">TicketRush</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-gray-900" style="font-variation-settings: 'FILL' 0;">help</span>
</div>
</header>
<!-- Main Content Area: Poster Style Waiting Room -->
<main class="flex-grow flex items-center justify-center p-8 poster-bg relative">
<!-- Decorative Shapes -->
<div class="rotated-shape w-96 h-96 top-[-100px] left-[-100px]"></div>
<div class="rotated-shape w-64 h-64 bottom-[10%] right-[10%]"></div>
<div class="rotated-shape w-48 h-48 top-[20%] right-[-50px]"></div>
<!-- Central Content Canvas -->
<div class="bg-white p-12 max-w-2xl w-full text-center relative z-10 thick-border">
<div class="mb-8 flex justify-center">
<div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center flat-border">
<span class="material-symbols-outlined text-4xl text-gray-900" style="font-variation-settings: 'FILL' 1;">hourglass_top</span>
</div>
</div>
<h1 class="font-h1 text-h1 text-gray-900 mb-2 uppercase tracking-tight">You are in line</h1>
<div class="bg-gray-100 py-6 px-8 mx-auto my-8 flat-border inline-block">
<p class="font-label-bold text-label-bold text-gray-600 uppercase mb-2">Current Status</p>
<p class="text-[64px] font-black leading-none tracking-tighter text-gray-900">Position #105</p>
</div>
<p class="font-h3 text-h3 text-gray-900 mb-8 border-t-2 border-b-2 border-gray-900 py-4 uppercase">
                Please do not refresh.<br/>We will grant access soon.
            </p>
<div class="flex items-center justify-center gap-2 text-gray-600">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">info</span>
<span class="font-body-md text-body-md">Your expected wait time is approximately 4 minutes.</span>
</div>
<!-- Progress Indicator placeholder -->
<div class="mt-12 w-full h-4 bg-gray-100 flat-border overflow-hidden">
<div class="h-full bg-blue-600 w-3/4 border-r-2 border-gray-900"></div>
</div>
</div>
</main>
<!-- Simplified Footer -->
<footer class="bg-gray-900 text-white w-full py-8 px-8 flex flex-col md:flex-row justify-between items-center gap-6 border-t-4 border-blue-600">
<span class="font-h3 text-h3 font-black">TicketRush</span>
<p class="font-label-bold text-label-bold uppercase text-gray-400">© 2024 TicketRush. Digital-Print Velocity.</p>
</footer>
</body></html>
